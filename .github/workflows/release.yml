name: Release

# First publish requires manual npm setup:
# 1. Create the npm org "primo-brutality" at https://www.npmjs.com/org/create
# 2. Create an Automation token with publish access to @primo-brutality
# 3. Add it as the NPM_TOKEN repository secret
# 4. Re-run this workflow (first publish cannot use OIDC alone)
# After the first release, configure Trusted Publishers on npm and remove NPM_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node writes _authToken=${NODE_AUTH_TOKEN} to .npmrc; required for token bootstrap
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
